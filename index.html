<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGroups — карта точек и чат</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>GeoGroups</h1>
    <p>Отмечайте геоточки по группам, фильтруйте и общайтесь в чате.</p>
  </header>

  <main class="layout">
    <section class="panel controls">
      <h2>Профиль и фильтры</h2>

      <label>
        Текущий пользователь
        <select id="currentUser"></select>
      </label>

      <label>
        Фильтр по пользователю
        <select id="userFilter">
          <option value="all">Все пользователи</option>
        </select>
      </label>

      <fieldset>
        <legend>Фильтр по группам</legend>
        <div id="groupFilters" class="checkbox-list"></div>
      </fieldset>

      <div class="hint">
        <p><strong>Добавление точки:</strong> кликните по карте, заполните форму и сохраните.</p>
        <p>Редактировать и удалять можно только свои точки.</p>
      </div>
    </section>

    <section class="panel map-panel">
      <h2>Интерактивная карта</h2>
      <div id="map"></div>
      <form id="pointForm" class="point-form">
        <input type="hidden" id="pointId" />
        <label>
          Название точки
          <input id="pointTitle" type="text" placeholder="Например: склад #2" required />
        </label>
        <label>
          Описание
          <textarea id="pointDescription" rows="2" placeholder="Короткое описание"></textarea>
        </label>
        <label>
          Группа
          <select id="pointGroup"></select>
        </label>
        <label>
          Координаты
          <input id="pointCoords" type="text" readonly />
        </label>
        <div class="buttons">
          <button type="submit">Сохранить точку</button>
          <button type="button" id="cancelEdit" class="ghost">Отмена</button>
        </div>
      </form>
    </section>

    <section class="panel chat-panel">
      <h2>Чат</h2>
      <label>
        Собеседник
        <select id="chatPartner"></select>
      </label>
      <div id="chatMessages" class="chat-messages"></div>
      <form id="chatForm" class="chat-form">
        <textarea id="chatInput" rows="3" placeholder="Введите сообщение" required></textarea>
        <button type="submit">Отправить</button>
      </form>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
